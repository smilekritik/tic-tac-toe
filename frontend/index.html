<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tic-tac-toe.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-tac-toe</title>

    <meta
      name="description"
      content="Simple online tic-tac-toe game by Kritik."
    />
    <meta property="og:title" content="Tic-tac-toe" />
    <meta
      property="og:description"
      content="Simple online tic-tac-toe game by Kritik."
    />
    <meta property="og:image" content="/tic-tac-toe.svg" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Tic-tac-toe" />
    <meta
      name="twitter:description"
      content="Simple online tic-tac-toe game by Kritik."
    />
    <meta name="twitter:image" content="/tic-tac-toe.svg" />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      #root {
        flex: 1;
      }

      footer {
        padding: 0.75rem 1rem;
        border-top: 1px solid #e5e5e5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.875rem;
        color: #555;
        background: #fafafa;
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .footer-logo {
        width: 20px;
        height: 20px;
      }

      .footer-button {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        border: 1px solid #24292e;
        background: #24292e;
        color: #ffffff;
        text-decoration: none;
        font-size: 0.8rem;
        transition: background 0.15s ease, color 0.15s ease,
          transform 0.1s ease;
      }

      .footer-button:hover {
        background: #ffffff;
        color: #24292e;
        transform: translateY(-1px);
      }

      .footer-button-icon {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid currentColor;
        position: relative;
      }

      .footer-button-icon::before {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: inherit;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-bottom-color: transparent;
        transform: rotate(-45deg);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <footer>
      <div class="footer-left">
        <img src="/tic-tac-toe.svg" alt="Tic-tac-toe logo" class="footer-logo" />
        <span>Tic-tac-toe by Kritik</span>
      </div>
      <a
        class="footer-button"
        href="https://github.com/smilekritik/tic-tac-toe"
        target="_blank"
        rel="noreferrer"
      >
        <span class="footer-button-icon"></span>
        <span>GitHub</span>
      </a>
    </footer>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
