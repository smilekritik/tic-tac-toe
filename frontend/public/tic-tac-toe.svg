<svg width="32" height="32" xmlns="http://www.w3.org/2000/svg">
<!-- Vertical lines -->
<line x1="10" y1="0" x2="10" y2="32" stroke="white" stroke-width="1" />
<line x1="22" y1="0" x2="22" y2="32" stroke="white" stroke-width="1" />

<!-- Horizontal lines -->
<line x1="0" y1="10" x2="32" y2="10" stroke="white" stroke-width="1" />
<line x1="0" y1="22" x2="32" y2="22" stroke="white" stroke-width="1" />

<!-- Empty red circle in the upper-left cell -->
<circle cx="4.5" cy="4.5" r="3" stroke="red" stroke-width="2" fill="none" />

<!-- Blue cross in the center -->
<line x1="12" y1="12" x2="20" y2="20" stroke="blue" stroke-width="2" />
<line x1="20" y1="12" x2="12" y2="20" stroke="blue" stroke-width="2" />

<!-- Left zero in the bottom stripe -->
<circle cx="4.5" cy="28" r="3" stroke="red" stroke-width="2" fill="none" />

<!-- Right cross in the bottom stripe -->
<line x1="24" y1="24" x2="32" y2="32" stroke="blue" stroke-width="2" /> 
<line x1="32" y1="24" x2="24" y2="32" stroke="blue" stroke-width="2" />
</svg>