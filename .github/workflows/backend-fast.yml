name: backend-fast

on:
  pull_request:
    paths:
      - 'backend-nest/**'
      - 'prisma/**'
      - '.github/workflows/backend-fast.yml'
  push:
    branches:
      - main
    paths:
      - 'backend-nest/**'
      - 'prisma/**'
      - '.github/workflows/backend-fast.yml'

jobs:
  backend-fast:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-nest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/tictactoe_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend-nest/package-lock.json

      - run: npm ci
        working-directory: .
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:validate
      - run: npm run build
      - run: npm run test:smoke
      - run: npm run test:unit
