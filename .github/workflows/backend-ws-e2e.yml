name: backend-ws-e2e

on:
  pull_request:
    paths:
      - 'backend-nest/**'
      - 'prisma/**'
      - '.github/workflows/backend-ws-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'backend-nest/**'
      - 'prisma/**'
      - '.github/workflows/backend-ws-e2e.yml'

jobs:
  backend-ws-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-nest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tictactoe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d tictactoe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/tictactoe_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-nest/package-lock.json

      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy --schema ../prisma/schema.prisma
      - run: npm run test:ws
