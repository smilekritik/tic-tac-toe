rooms:
  - name: "user:{userId}"
    description: User-specific room for personal notifications (matchmaking results)
  - name: "match:{matchId}"
    description: Match-specific room for game events (moves, state updates, disconnections)

timeouts:
  - name: Turn Timeout
    value: 30 seconds
    description: Maximum time per move
  - name: Reconnect Timeout
    value: 30 seconds
    description: Time to reconnect after disconnection
  - note: If timeouts are exceeded, the game ends with appropriate result type.
