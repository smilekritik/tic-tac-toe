events:
  authenticate:
    direction: send
    summary: Authenticate connection with JWT token
    description: Authenticate the WebSocket connection with a valid JWT access token.
    payload:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: JWT access token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    responses:
      - event: authenticated
        description: Authentication successful
      - event: error
        description: Authentication failed

  authenticated:
    direction: receive
    summary: Authentication confirmation
    description: Server confirms successful authentication and provides user information.
    payload:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        username:
          type: string
