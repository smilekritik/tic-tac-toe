flow:
  title: Matchmaking Flow
  steps:
    - Client sends matchmaking:join
    - Server responds matchmaking:queued
    - When match found, server sends matchmaking:matched to both players
    - Players join game room and start playing

events:
  matchmaking:join:
    direction: send
    summary: Join matchmaking queue
    description: Join the matchmaking queue. Requires email verification.
    payload:
      type: object
      description: Empty payload
    responses:
      - event: matchmaking:queued
        description: Successfully joined queue
      - event: matchmaking:matched
        description: Match found
      - event: matchmaking:error
        description: Failed to join

  matchmaking:queued:
    direction: receive
    summary: Queue confirmation
    description: Confirmation that client is in the matchmaking queue.

  matchmaking:matched:
    direction: receive
    summary: Match found notification
    description: Match found! Game is ready to start.
    payload:
      type: object
      required:
        - matchId
        - symbol
        - opponent
      properties:
        matchId:
          type: string
          format: uuid
        symbol:
          type: string
          enum: [X, O]
        opponent:
          type: string
          description: Opponent's username

  matchmaking:leave:
    direction: send
    summary: Leave matchmaking queue
    description: Leave the matchmaking queue.
    payload:
      type: object
      description: Empty payload

  matchmaking:left:
    direction: receive
    summary: Leave confirmation
    description: Confirmation that client left the queue.
