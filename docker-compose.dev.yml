services:
  postgres:
    image: postgres:16-alpine
    container_name: tictactoe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tictactoe-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles:
      - legacy
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: tictactoe-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5001:5000"
      - "5555:5555"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./prisma:/app/prisma
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tictactoe-network

  backend-nest:
    build:
      context: .
      dockerfile: ./backend-nest/Dockerfile
    container_name: tictactoe-backend-nest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NPM_CONFIG_INCLUDE: dev
      PORT: 5000
    command: >
      sh -lc "if [ ! -x node_modules/.bin/ts-node ] || [ ! -d node_modules/dayjs ] || [ ! -d node_modules/socket.io-client ]; then npm install --include=dev; fi && npm run dev"
    ports:
      - "${PORT}:5000"
    volumes:
      - ./backend-nest:/app
      - /app/node_modules
      - ./prisma:/app/prisma
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tictactoe-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tictactoe-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-nest
    networks:
      - tictactoe-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: tictactoe-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - frontend
      - backend-nest
    networks:
      - tictactoe-network

volumes:
  postgres_data:

networks:
  tictactoe-network:
    driver: bridge

